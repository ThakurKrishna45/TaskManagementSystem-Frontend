<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center;">

<div class="login-container" style="background: white; padding: 50px 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); width: 100%; max-width: 400px; animation: slideIn 0.5s ease-out;">
    <h1 style="margin-bottom: 10px; color: #333; font-size: 28px; text-align: center; font-weight: 600;">Task Manager</h1>
    <p style="text-align: center; color: #666; margin-bottom: 30px; font-size: 14px;">Sign in to your account</p>

    <div th:if="${error}" th:text="${error}" style="background-color: #fee; border: 1px solid #fcc; color: #c33; padding: 12px; margin-bottom: 20px; font-size: 14px; border-radius: 6px; display: flex; align-items: center; gap: 8px;"></div>

    <form th:action="@{/login-process}" th:object="${loginRequest}" method="post">

        <div style="margin-bottom: 18px;">
            <label style="display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px;">Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter your username" required
                   style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; transition: border-color 0.3s ease; background-color: #f9f9f9;"
                   onmouseover="this.style.borderColor='#667eea';" onmouseout="this.style.borderColor='#e0e0e0';">
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px;">Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter your password" required
                   style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; transition: border-color 0.3s ease; background-color: #f9f9f9;"
                   onmouseover="this.style.borderColor='#667eea';" onmouseout="this.style.borderColor='#e0e0e0';">
        </div>

        <button type="submit"
                style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 16px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);"
                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.6)';"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';">
            Sign In
        </button>

    </form>
</div>

<style>
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

</body>
</html>
