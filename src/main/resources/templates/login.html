<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Task Manager</title>
</head>
<body style="font-family: sans-serif; padding: 50px; background-color: #f4f4f4; text-align: center;">

<div class="login-container" style="display: inline-block; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ccc; width: 300px;">
    <h2 style="margin-top: 0;">Login</h2>

    <div th:if="${error}" th:text="${error}" style="color: red; margin-bottom: 10px; font-size: 14px;"></div>
    <form th:action="@{/login-process}" th:object="${loginRequest}" method="post">

        <input type="text" th:field="*{username}" placeholder="Username" required
               style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

        <input type="password" th:field="*{password}" placeholder="Password" required
               style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

        <button type="submit"
                style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Login
        </button>

    </form>
</div>

</body>
</html>
