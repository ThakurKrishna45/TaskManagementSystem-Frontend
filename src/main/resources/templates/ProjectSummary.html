<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project Summary</title>
</head>

<body style="font-family: Arial, Helvetica, sans-serif; margin: 20px; background-color: aliceblue;">
<h2 style="color:#333;">Project Summary</h2>

<form th:action="@{/projects/summary/find}" method="get"
      style="background:#fff;padding:15px;border-radius: 5px;width: 300px;box-shadow: 0 0 5px #ccc;">
    <label style="font-weight: bold;">Project Id</label><br>
    <input type="number" name="projectId" min="1" th:value="${projectId}" required
           style="width:100%; padding:8px;margin-top: 5px;margin-bottom: 10px; border:1px solid #ccc; border-radius: 3px;">

    <button type="submit"
            style="background-color:#007bff;color:white;padding:8px 12px; border: none;border-radius: 3px;cursor: pointer;">Get Summary</button>
</form>


<p style="color:red; margin-top:10px;" th:if="${error}" th:text="${error}"></p>

<div th:if="${summaries != null}" style="margin-top: 20px;">
    <p th:if="${#lists.isEmpty(summaries)}" style="color:gray;">No Data Found</p>

    <table border="1" th:unless="${#lists.isEmpty(summaries)}"
           style="border-collapse: collapse; width:100%;background: #fff;">
        <tr style="background-color: #007bff;color:white;">
            <th style="padding:8px">#</th>
            <th style="padding:8px">User</th>
            <th style="padding:8px">Task</th>
            <th style="padding:8px">Project</th>
            <th style="padding:8px">Status</th>
        </tr>

        <tr th:each="s,i:${summaries}" style="text-align: center;">
            <td style="padding:8px" th:text="${i.count}"></td>
            <td style="padding:8px" th:text="${s.userName}"></td>
            <td style="padding:8px" th:text="${s.task}"></td>
            <td style="padding:8px" th:text="${s.name}"></td>
            <td style="padding:8px" th:text="${s.status}"></td>

        </tr>

    </table>

</div>
</body>
</html>
