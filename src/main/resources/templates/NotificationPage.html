<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Task Management System</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff; /* Strictly white background */
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            transition: all 0.2s ease-in-out;
            background: #fff;
        }

        .back-btn:hover {
            background-color: #f8f9fa;
            color: #28a745;
            border-color: #28a745;
            transform: translateX(-3px);
        }

        .back-btn svg {
            margin-right: 8px;
        }

        /* Headers */
        h2 { color: #1a1a1a; margin: 0 0 5px 0; font-weight: 700; font-size: 1.8rem; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }

        /* Form Card */
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 40px;
        }

        h3 { margin-top: 0; color: #444; font-size: 1.1rem; margin-bottom: 20px; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 200px;
        }

        label { font-size: 0.8rem; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }

        input {
            padding: 12px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 10px; /* Roundy corners */
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #fafafa;
        }

        input:focus {
            border-color: #28a745;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1);
        }

        button {
            padding: 12px 28px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px; /* Roundy corners */
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        button:hover {
            background: #218838;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3);
        }

        /* Table Section */
        .table-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .table-container {
            background: #fff;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #fafafa;
            color: #888;
            text-align: left;
            padding: 18px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #f0f0f0;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid #f8f8f8;
            font-size: 0.95rem;
            color: #333;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover {
            background-color: #f9fffb;
        }

        /* Styling for the data points */
        .badge-id {
            background: #f1f3f5;
            color: #495057;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .text-message { font-weight: 500; color: #2c3e50; }
        .text-date { color: #999; font-size: 0.85rem; }

        /* Alerts */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        .error { background: #fff5f5; color: #c92a2a; border: 1px solid #ffc9c9; }
        .empty { background: #fff9db; color: #e67700; border: 1px solid #ffe066; }

    </style>
</head>

<body>

<div class="container">
    <a th:href="@{/dashboard}" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
    </a>

    <h2>Notifications</h2>
    <p class="subtitle">View and manage the latest updates for your tasks.</p>

    <div class="card">
        <h3>Fetch Recent Logs</h3>
        <form th:action="@{/notifications/find-recent}" method="get">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px;">
                <div class="form-group">
                    <label for="userId">Target User ID</label>
                    <input type="number" id="userId" name="userId" placeholder="Enter ID (e.g. 1)" required>
                </div>
                <div class="form-group">
                    <label for="n">Message Count</label>
                    <input type="number" id="n" name="n" placeholder="Max results (e.g. 10)" required>
                </div>
            </div>
            <button type="submit">Retrieve Notifications</button>
        </form>
    </div>

    <div th:if="${error}" class="alert error">
        <span style="margin-right:10px;">⚠️</span>
        <span th:text="${error}"></span>
    </div>

    <div th:if="${notifications != null and #lists.isEmpty(notifications)}" class="alert empty">
        <span style="margin-right:10px;">🔎</span>
        <span>No notifications found for User ID: <strong th:text="${userId}"></strong></span>
    </div>

    <div th:if="${notifications != null and !#lists.isEmpty(notifications)}">
        <div class="table-header-flex">
            <h4 style="margin:0; color:#555;">Viewing results for ID: <span th:text="${userId}" style="color:#28a745;"></span></h4>
            <span style="font-size: 0.8rem; color:#aaa;" th:text="${notifications.size() + ' items found'}"></span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Reference ID</th>
                        <th>Message Content</th>
                        <th>Timestamp</th>
                        <th>Assigned To</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="notif, i : ${notifications}">
                        <td th:text="${i.count}" style="color: #ccc; font-weight: bold; width: 40px;"></td>
                        <td><span class="badge-id" th:text="${notif.notificationID}"></span></td>
                        <td class="text-message" th:text="${notif.text}"></td>
                        <td class="text-date" th:text="${notif.formattedDate}"></td>
                        <td th:text="${notif.fullName}" style="font-weight: 600; color: #444;"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
