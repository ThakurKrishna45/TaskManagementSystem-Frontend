<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
</head>

<body style="font-family: Arial; margin: 30px; background-color: #f9f9f9;">

<h2 style="margin-bottom: 5px;">Notifications</h2>
<p style="color: gray;">Get 'N' recent notifications for a user.</p>

<hr style="margin: 20px 0;">

<!-- Form -->
<div style="background: white; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
    <h3>Get Recent Notifications</h3>

    <form th:action="@{/notifications/find-recent}" method="get">

        <label for="userId">User ID:</label><br>
        <input type="number" id="userId" name="userId" placeholder="Enter User ID" required
               style="padding:6px; margin-top:5px; width:200px;"><br><br>

        <label for="n">Count (N):</label><br>
        <input type="number" id="n" name="n" placeholder="Enter count" required
               style="padding:6px; margin-top:5px; width:200px;"><br><br>

        <button type="submit"
                style="padding:6px 12px; background:#28a745; color:white; border:none; border-radius:4px;">
            Fetch Recent
        </button>
    </form>
</div>

<!-- Error -->
<div th:if="${error}"
     style="color:red; margin-bottom:20px; font-weight:bold;">
    <span th:text="${error}"></span>
</div>

<!-- Empty result message -->
<div th:if="${notifications != null and #lists.isEmpty(notifications)}"
     style="color:orange; margin-bottom:20px; font-weight:bold;">
    No notifications found for User ID: <span th:text="${userId}"></span>
</div>

<!-- Table Result -->
<div th:if="${notifications != null and !#lists.isEmpty(notifications)}"
     style="background: white; padding: 15px; border-radius: 6px;">

    <h4>Recent Notifications for User ID: <span th:text="${userId}"></span></h4>

    <table style="width:100%; border-collapse: collapse; margin-top:10px;">
        <tr style="background:#eee;">
            <th style="padding:8px; border:1px solid #ccc;">#</th>
            <th style="padding:8px; border:1px solid #ccc;">ID</th>
            <th style="padding:8px; border:1px solid #ccc;">Message</th>
            <th style="padding:8px; border:1px solid #ccc;">Created At</th>
        </tr>

        <tr th:each="notif, i : ${notifications}">
            <td style="padding:8px; border:1px solid #ccc;" th:text="${i.count}"></td>
            <td style="padding:8px; border:1px solid #ccc;" th:text="${notif.notificationID}"></td>
            <td style="padding:8px; border:1px solid #ccc;" th:text="${notif.text}"></td>
            <td style="padding:8px; border:1px solid #ccc;" th:text="${notif.createdAt}"></td>
        </tr>
    </table>
</div>

</body>
</html>
