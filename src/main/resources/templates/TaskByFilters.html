<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks by Priority & Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        table tbody tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>

<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; margin: 0; padding: 20px; animation: fadeIn 0.4s ease-in;">

<div style="max-width: 1200px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="color: #333; font-size: 32px; font-weight: 600; margin: 0;">Tasks Dashboard</h1>
        <a href="/dashboard" style="background-color: #667eea; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: 500; transition: background-color 0.3s;"
           onmouseover="this.style.backgroundColor='#764ba2';" onmouseout="this.style.backgroundColor='#667eea';">← Back to Home</a>
    </div>

    <div style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); margin-bottom: 25px;">
        <h3 style="color: #333; margin-bottom: 18px; font-size: 18px; font-weight: 600;">Filter Tasks</h3>

        <form th:action="@{/tasks/by-filter/find}" method="get" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">

            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; margin-bottom: 8px; color: #555; font-weight: 500; font-size: 14px;">Priority Level:</label>
                <select name="priority" required style="width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; background-color: white; cursor: pointer; transition: border-color 0.3s;"
                        onmouseover="this.style.borderColor='#667eea';" onmouseout="this.style.borderColor='#e0e0e0';">
                    <option value="">--Select Priority--</option>
                    <option value="HIGH" th:selected="${priority == 'HIGH'}">🔴 HIGH</option>
                    <option value="MEDIUM" th:selected="${priority == 'MEDIUM'}">🟡 MEDIUM</option>
                    <option value="LOW" th:selected="${priority == 'LOW'}">🟢 LOW</option>
                </select>
            </div>

            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; margin-bottom: 8px; color: #555; font-weight: 500; font-size: 14px;">Status:</label>
                <select name="status" required style="width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; background-color: white; cursor: pointer; transition: border-color 0.3s;"
                        onmouseover="this.style.borderColor='#667eea';" onmouseout="this.style.borderColor='#e0e0e0';">
                    <option value="">--Select Status--</option>
                    <option value="In Progress" th:selected="${status == 'In Progress'}">⏳ IN PROGRESS</option>
                    <option value="PENDING" th:selected="${status == 'PENDING'}">⏸ PENDING</option>
                    <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">✓✓ COMPLETED</option>
                </select>
            </div>

            <button type="submit" style="padding: 11px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 18px rgba(102, 126, 234, 0.5)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(102, 126, 234, 0.3)';">
                🔍 Find Tasks
            </button>

        </form>
    </div>

    <div th:if="${error}" style="background-color: #fee; border-left: 4px solid #f44; color: #c33; padding: 16px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; box-shadow: 0 2px 4px rgba(244, 67, 54, 0.1);">
        ⚠️ <span th:text="${error}"></span>
    </div>

    <div th:if="${tasks != null}" style="background: white; padding: 18px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
        <p style="margin: 0; color: #555; font-size: 15px;">
            <strong style="color: #667eea; font-size: 18px;" th:text="${#lists.size(tasks)}"></strong>
            <span style="color: #666;"> task(s) found</span>
        </p>
    </div>

    <div th:if="${tasks != null and #lists.isEmpty(tasks)}" style="background: white; padding: 40px; text-align: center; border-radius: 10px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
        <p style="color: #999; font-size: 16;">😕 No tasks found. Try different filters.</p>
    </div>

    <div th:if="${tasks != null and !#lists.isEmpty(tasks)}" style="background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
        <table style="width: 100%; border-collapse: collapse;">
            <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <tr>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">#</th>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">Task Name</th>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">Description</th>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">Due Date</th>
                    <th style="padding: 16px; text-align: center; font-weight: 600; font-size: 14px;">Priority</th>
                    <th style="padding: 16px; text-align: center; font-weight: 600; font-size: 14px;">Status</th>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">Project</th>
                    <th style="padding: 16px; text-align: left; font-weight: 600; font-size: 14px;">User</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t, idx : ${tasks}" style="border-bottom: 1px solid #e0e0e0; transition: background-color 0.2s;">
                    <td style="padding: 14px 16px; color: #667eea; font-weight: 600; font-size: 13px;" th:text="${idx.count}"></td>
                    <td style="padding: 14px 16px; color: #333; font-weight: 500;" th:text="${t.taskName}"></td>
                    <td style="padding: 14px 16px; color: #666; font-size: 13px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${t.description}"></td>
                    <td style="padding: 14px 16px; color: #666; font-size: 13px;" th:text="${t.dueDate}"></td>
                    <td style="padding: 14px 16px; text-align: center;">
                        <span th:switch="${t.priority}">
                            <span th:case="'High'" style="background-color: #ffebee; color: #c33; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> HIGH</span>
                            <span th:case="'Medium'" style="background-color: #fff3e0; color: #e65100; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> MEDIUM</span>
                            <span th:case="'Low'" style="background-color: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> LOW</span>
                            <span th:case="*" style="background-color: #f5f5f5; color: #666; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;" th:text="${t.priority}"></span>
                        </span>
                    </td>
                    <td style="padding: 14px 16px; text-align: center;">
                        <span th:switch="${t.status}">
                            <span th:case="'In Progress'" style="background-color: #f3e5f5; color: #6a1b9a; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> IN PROGRESS</span>
                            <span th:case="'Pending'" style="background-color: #ffe0b2; color: #e65100; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> PENDING</span>
                            <span th:case="'Completed'" style="background-color: #c8e6c9; color: #1b5e20; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;"> COMPLETED</span>
                            <span th:case="*" style="background-color: #f5f5f5; color: #666; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;" th:text="${t.status}"></span>
                        </span>
                    </td>
                    <td style="padding: 14px 16px; color: #666; font-size: 13px;" th:text="${t.projectName}"></td>
                    <td style="padding: 14px 16px; color: #666; font-size: 13px;" th:text="${t.username}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
